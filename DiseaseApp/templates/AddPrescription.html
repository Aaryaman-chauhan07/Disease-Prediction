{% load static %}
<html>
<head>
<title>Disease Prediction using GBDT</title>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<link rel="stylesheet" type="text/css" href="{% static 'style.css' %}"/>
 <script LANGUAGE="Javascript" >
function validate(){
	var x=document.forms["f1"]["t1"].value;
	var y=document.forms["f1"]["t2"].value;
	if(x == null || x==""){
		window.alert("disease name must be enter");
		document.f1.t1.focus();
		return false;
	}
	if(y == null || y==""){
		window.alert("medicines list must be enter");
		document.f1.t2.focus();
		return false;
	}
	return true;
}
		
	
	</script>
</head>
<body>
<div id="wrapper">
	<div id="header">
		<div id="logo">
			<center><font size="4" color="yellow">Disease Prediction using GBDT</font></center>
		</div>
		<div id="slogan">
			
		</div>
	</div>
	<div id="menu">
		<ul><center>
	  <li><a href="{% url 'TrainML' %}">Train ML Model</a></li>
	  <li><a href="{% url 'AddHospitals' %}">Add Hospitals</a></li>
	   <li><a href="{% url 'AddPharmacy' %}">Add Pharmacy</a></li>
	   <li><a href="{% url 'AddDiagnostic' %}">Add Diagnostics</a></li>	  
	   <li><a href="{% url 'AddPrescription' %}">Prescriptions</a></li>	
      <li><a href="{% url 'index' %}">Logout</a></li>		
		</center></ul>
<br class="clearfix" />
				</div>
			
	<div id="splash">
		<img class="pic" src="{% static 'images/investor.jpg' %}" width="870" height="230" alt="" />
	</div>	
			<center>
<form name="f1" method="post" action={% url 'AddPrescriptionAction' %} OnSubmit="return validate()">
	{% csrf_token %}<br/>
   <h3><b>Add Prescription Screen</b></h3>
   
	<font size="" color="black"><center>{{ data|safe }}</center></font>
						
						<table align="center" width="80" >
			 <tr><td><font size="" color="black">Disease&nbsp;Name</b></td><td><input type="text" name="t1" style="font-family: Comic Sans MS" size="40"/></td></tr>
         
		   <tr><td><font size="" color="black">Prescribed&nbsp;Medicines</b></td><td><input type="text" name="t2" style="font-family: Comic Sans MS" size="60"/></td></tr>
				 
			<tr><td></td><td><input type="submit" value="Submit">
			</td>
			</table>

				</div>

</html>
